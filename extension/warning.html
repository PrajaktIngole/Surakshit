<!DOCTYPE html>
<html>

<head>

  <title>Dangerous Website</title>

  <style>

    body {

      margin: 0;

      background: #020617;

      color: white;

      font-family: Arial;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;
    }

    .box {

      background: #0f172a;

      padding: 40px;

      border-radius: 20px;

      text-align: center;

      width: 500px;

      border: 1px solid #ef4444;
    }

    h1 {

      color: #ef4444;

      font-size: 40px;
    }

    p {

      color: #cbd5e1;

      margin-top: 20px;

      line-height: 1.6;
    }

    button {

      margin-top: 30px;

      padding: 14px 24px;

      border: none;

      border-radius: 12px;

      background: #ef4444;

      color: white;

      font-size: 16px;

      cursor: pointer;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>⚠ Dangerous Website</h1>

    <p>

      Surakshit detected this website
      as potentially dangerous or phishing.

    </p>

    <button onclick="history.back()">
      Go Back
    </button>

  </div>

</body>

</html>
